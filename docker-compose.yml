services:
  db:
    image: postgres:16-alpine
    # 仅绑定云主机 127.0.0.1，供 SSH 隧道 + Navicat 连库，不对公网开放
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
      POSTGRES_DB: funplanet
    volumes:
      - funplanet_pg:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/funplanet?schema=public
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      WANX_MODEL: ${WANX_MODEL:-wan2.6-t2i}
      WANX_SIZE: ${WANX_SIZE:-1280*1280}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ALLOW_ADMIN_REGISTER: ${ALLOW_ADMIN_REGISTER:-false}
      TZ: Asia/Shanghai
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>r.json()).then(j=>process.exit(j.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./assets:/assets
      - ./server/data:/app/data

volumes:
  funplanet_pg:
